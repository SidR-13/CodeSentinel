name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://codesentinel:codesentinel@localhost:5432/codesentinel
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-not-for-production
      AI_MOCK: "true"

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: codesentinel
          POSTGRES_PASSWORD: codesentinel
          POSTGRES_DB: codesentinel
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Import check
        working-directory: backend
        run: python -c "from app.main import app; print('imports OK')"

  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ""
